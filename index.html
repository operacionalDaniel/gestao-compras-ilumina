<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestão de Compras · PO.04</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0f1f38; --navy-2:#16294a; --navy-3:#1e3459;
    --amber:#e8a33d; --amber-2:#f4c064;
    --teal:#2a9d8f; --teal-2:#3fc2b0;
    --danger:#d9534f; --ok:#3fa35f;
    --bg:#f4f6fa; --card:#ffffff; --line:#e3e8f0;
    --ink:#182238; --ink-soft:#5b6579; --ink-faint:#8b93a7;
    --radius:10px; --radius-sm:6px;
    --shadow:0 1px 2px rgba(15,31,56,.06), 0 4px 16px rgba(15,31,56,.05);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px}
  h1,h2,h3,.display{font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:.2px}
  header{background:var(--navy);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;box-shadow:var(--shadow)}
  header .brand{display:flex;align-items:center;gap:10px}
  header .brand h1{font-size:22px;margin:0;color:#fff}
  header .brand .tag{font-size:11px;color:var(--amber-2);text-transform:uppercase;letter-spacing:1.2px;font-family:Inter;font-weight:600}
  header nav{display:flex;gap:4px}
  header nav button{background:transparent;border:none;color:#c8d1e3;padding:8px 14px;border-radius:var(--radius-sm);cursor:pointer;font:600 13px Inter;transition:.15s}
  header nav button:hover{background:var(--navy-3);color:#fff}
  header nav button.active{background:var(--amber);color:var(--navy)}
  header .gear{background:transparent;border:1px solid #33456b;color:#c8d1e3;border-radius:var(--radius-sm);padding:7px 10px;cursor:pointer;font-size:13px}
  main{max-width:1180px;margin:0 auto;padding:24px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
  .btn{border:none;border-radius:var(--radius-sm);padding:9px 16px;font:600 13px Inter;cursor:pointer;transition:.15s}
  .btn-primary{background:var(--amber);color:var(--navy)}
  .btn-primary:hover{background:var(--amber-2)}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:var(--teal-2)}
  .btn-outline{background:transparent;border:1px solid var(--line);color:var(--ink)}
  .btn-outline:hover{background:#f0f3f8}
  .btn-danger{background:transparent;color:var(--danger);border:1px solid #f0c9c8}
  .btn-sm{padding:5px 10px;font-size:12px}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font:600 11px Inter;text-transform:uppercase;letter-spacing:.6px;color:var(--ink-faint);padding:8px 10px;border-bottom:2px solid var(--line)}
  td{padding:9px 10px;border-bottom:1px solid var(--line);font-size:13.5px}
  tr:hover td{background:#fafbfd}
  .id-pill{font-family:'Barlow Condensed';font-weight:700;background:var(--navy);color:var(--amber-2);padding:2px 9px;border-radius:20px;font-size:12.5px;letter-spacing:.3px}
  .status{padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .status.aberta{background:#eaf1fe;color:#2b5fb8}
  .status.em_cotacao{background:#fef3e0;color:#a5680a}
  .status.concluida,.status.emitida,.status.recebida{background:#e4f5ea;color:#1f7a44}
  .status.cancelada{background:#fbe9e8;color:#b3352f}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:var(--radius-sm);font:400 13.5px Inter;color:var(--ink);background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--teal);outline-offset:1px}
  label{font-size:12px;font-weight:600;color:var(--ink-soft);display:block;margin-bottom:4px}
  .field{margin-bottom:12px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .muted{color:var(--ink-faint)}
  .empty{padding:40px 20px;text-align:center;color:var(--ink-faint)}
  .empty .display{font-size:20px;color:var(--ink-soft)}
  .modal-bg{position:fixed;inset:0;background:rgba(15,31,56,.45);display:flex;align-items:flex-start;justify-content:center;padding:40px 16px;overflow:auto;z-index:50}
  .modal{background:#fff;border-radius:var(--radius);max-width:720px;width:100%;padding:24px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
  .modal h2{margin:0 0 16px}
  .item-row{display:grid;grid-template-columns:90px 1fr 70px 90px 32px;gap:8px;margin-bottom:8px;align-items:center}
  .item-row input{font-size:13px}
  .close-x{background:none;border:none;font-size:20px;cursor:pointer;color:var(--ink-faint)}
  .toast{position:fixed;bottom:20px;right:20px;background:var(--navy);color:#fff;padding:12px 18px;border-radius:var(--radius-sm);box-shadow:var(--shadow);font-size:13.5px;z-index:100;animation:fadein .2s}
  .toast.err{background:var(--danger)}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  .cmp-table td.best{background:#e4f5ea;font-weight:700;color:#1f7a44}
  .breadcrumb{font-size:12.5px;color:var(--ink-faint);margin-bottom:10px;cursor:pointer}
  .breadcrumb span{color:var(--teal);cursor:pointer}
  .config-box{max-width:480px}
  .file-chip{display:inline-flex;align-items:center;gap:6px;background:#f0f3f8;padding:4px 10px;border-radius:20px;font-size:12px;color:var(--ink-soft)}
  a.link{color:var(--teal);text-decoration:none;font-weight:600}
</style>
</head>
<body>

<header id="appHeader" style="display:none">
  <div class="brand">
    <h1>Gestão de Compras</h1>
    <span class="tag">PO.04 · RQ.04.03 / 04.04 / 04.21</span>
  </div>
  <nav id="nav">
    <button data-tab="solicitacoes" class="active">Solicitações</button>
    <button data-tab="ordens">Ordens de Compra</button>
    <button data-tab="fornecedores">Fornecedores</button>
  </nav>
  <div style="display:flex;align-items:center;gap:8px">
    <span id="userEmail" class="muted" style="color:#c8d1e3;font-size:12px"></span>
    <button class="gear" onclick="openConfig()">⚙ Config</button>
    <button class="gear" onclick="fazerLogout()">Sair</button>
  </div>
</header>

<div id="loginScreen" style="max-width:360px;margin:80px auto;padding:0 16px">
  <div class="card">
    <h2 style="margin-top:0">Entrar</h2>
    <div class="field"><label>E-mail</label><input id="login_email" type="email" placeholder="seu@email.com"></div>
    <div class="field"><label>Senha</label><input id="login_senha" type="password"></div>
    <div id="loginMsg" class="muted" style="font-size:12.5px;margin-bottom:8px"></div>
    <button class="btn btn-primary" style="width:100%" onclick="fazerLogin()">Entrar</button>
  </div>
</div>

<main id="main" style="display:none"></main>

<script>
/* ============================================================
   CONFIG — salvo no localStorage deste navegador (não é dado
   sensível de outros usuários, só a URL/anon key públicas do
   seu projeto Supabase + o tenant_id deste painel).
   ============================================================ */
const CFG_KEY = 'gc_po04_config';
// Configuração padrão da Ilumina Içara — URL e anon key do projeto Supabase.
// O tenant_id NÃO fica aqui: ele é descoberto automaticamente após o login,
// a partir da permissão do usuário em painel_permissoes (mesmo padrão do
// auth.js usado nos outros painéis do Indica.AI/IluminaBoard).
const DEFAULT_CONFIG = {
  url: 'https://ryyyilzgfajihqtxwqjw.supabase.co',
  anonKey: 'sb_publishable_rGwWNSBzToLJjbh0U3_d6A_MmA1m99u'
};
function getConfig(){
  try{
    const saved = JSON.parse(localStorage.getItem(CFG_KEY)||'{}');
    return (saved.url && saved.anonKey) ? saved : DEFAULT_CONFIG;
  }catch(e){ return DEFAULT_CONFIG; }
}
function setConfig(c){ localStorage.setItem(CFG_KEY, JSON.stringify(c)); }

let sb = null;
let cfg = getConfig();
function initClient(){
  if(cfg.url && cfg.anonKey){
    try{
      sb = window.supabase.createClient(cfg.url, cfg.anonKey);
    }catch(e){
      console.error('Falha ao iniciar cliente Supabase (CDN pode estar bloqueado):', e);
      sb = null;
    }
  }
}
initClient();

function openConfig(){
  const c = getConfig();
  renderModal(`
    <h2>Configuração</h2>
    <div class="config-box">
      <div class="field"><label>Supabase URL</label><input id="cfg_url" value="${c.url||''}" placeholder="https://xxxx.supabase.co"></div>
      <div class="field"><label>Supabase anon key</label><input id="cfg_key" value="${c.anonKey||''}" placeholder="eyJ..."></div>
      <p class="muted" style="font-size:12px">O tenant é definido automaticamente pela sua permissão de acesso após o login — não precisa informar aqui.</p>
      <div class="row" style="margin-top:16px;justify-content:flex-end">
        <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
        <button class="btn btn-primary" onclick="saveConfig()">Salvar</button>
      </div>
    </div>
  `);
}
function saveConfig(){
  const url = document.getElementById('cfg_url').value.trim();
  const anonKey = document.getElementById('cfg_key').value.trim();
  setConfig({url, anonKey});
  cfg = getConfig();
  initClient();
  closeModal();
  toast('Configuração salva. Recarregando...');
  setTimeout(()=>location.reload(), 600);
}

function toast(msg, isErr){
  const t = document.createElement('div');
  t.className = 'toast' + (isErr?' err':'');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3200);
}

/* ============================================================
   MODAL helpers
   ============================================================ */
function renderModal(innerHtml){
  closeModal();
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.id = 'modalBg';
  bg.onclick = (e)=>{ if(e.target.id==='modalBg') closeModal(); };
  bg.innerHTML = `<div class="modal">${innerHtml}</div>`;
  document.body.appendChild(bg);
}
function closeModal(){ const m = document.getElementById('modalBg'); if(m) m.remove(); }

/* ============================================================
   NAV / ROUTER
   ============================================================ */
let state = { tab:'solicitacoes', solicitacaoId:null };
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button[data-tab]');
  if(!b) return;
  document.querySelectorAll('#nav button').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  state = { tab: b.dataset.tab, solicitacaoId: null };
  route();
});

async function route(){
  const main = document.getElementById('main');
  if(!sb){
    main.innerHTML = `<div class="card empty">
      <div class="display">Configure a conexão primeiro</div>
      <p class="muted">Clique em <b>⚙ Config</b> no topo e informe a URL e a anon key do seu projeto Supabase, além do tenant_id.</p>
    </div>`;
    return;
  }
  if(state.tab === 'solicitacoes' && !state.solicitacaoId) return renderSolicitacoesList();
  if(state.tab === 'solicitacoes' && state.solicitacaoId) return renderSolicitacaoDetail(state.solicitacaoId);
  if(state.tab === 'ordens') return renderOrdensList();
  if(state.tab === 'fornecedores') return renderFornecedores();
}

/* ============================================================
   HELPERS DE DADOS
   ============================================================ */
async function gerarId(tipo){
  const { data, error } = await sb.rpc('gerar_proximo_id', { p_tenant_id: cfg.tenantId, p_tipo: tipo });
  if(error){ toast('Erro ao gerar ID: '+error.message, true); throw error; }
  return data;
}
function money(v){ return (Number(v)||0).toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function fmtDate(d){ if(!d) return '—'; const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; }

/* ============================================================
   EXPORTAÇÃO / ENVIO DE DOCUMENTOS
   Cada função busca seus próprios dados direto do banco, então
   funciona de forma independente — não precisa ter passado
   pelas telas anteriores nesta sessão para exportar/enviar.
   ============================================================ */
function abrirDocumentoImpressao(titulo, corpoHtml, mailtoInfo){
  const w = window.open('', '_blank');
  if(!w){ toast('O navegador bloqueou a janela. Permita pop-ups para este site.', true); return; }
  const botaoEmail = mailtoInfo ? `
    <button onclick="window.location.href='mailto:${mailtoInfo.destinatario||''}?subject=${encodeURIComponent(mailtoInfo.assunto)}&body=${encodeURIComponent(mailtoInfo.corpo)}'"
      style="padding:8px 16px;background:#2a9d8f;color:#fff;border:none;border-radius:6px;cursor:pointer;font-weight:700;margin-right:8px">
      📧 Preparar e-mail
    </button>` : '';
  w.document.write(`
    <!DOCTYPE html><html><head><meta charset="UTF-8"><title>${titulo}</title>
    <style>
      body{font-family:Inter,Arial,sans-serif;color:#182238;padding:32px;max-width:820px;margin:0 auto}
      h1{font-family:'Barlow Condensed',sans-serif;font-size:22px;border-bottom:3px solid #0f1f38;padding-bottom:8px;margin-bottom:4px}
      table{width:100%;border-collapse:collapse;margin-top:14px}
      th,td{border:1px solid #ccc;padding:6px 8px;font-size:12.5px;text-align:left}
      th{background:#0f1f38;color:#fff}
      .best{background:#e4f5ea;font-weight:700}
      .header-info{font-size:13px;color:#555;margin-bottom:14px}
      .id-pill{font-family:'Barlow Condensed',sans-serif;font-weight:700;background:#0f1f38;color:#e8a33d;padding:2px 12px;border-radius:16px;font-size:15px}
      .actions{text-align:right;margin-bottom:20px}
      @media print{ .actions{display:none} }
    </style></head><body>
    <div class="actions">
      ${botaoEmail}
      <button onclick="window.print()" style="padding:8px 16px;background:#e8a33d;border:none;border-radius:6px;cursor:pointer;font-weight:700">🖨 Imprimir / Salvar PDF</button>
    </div>
    ${corpoHtml}
    </body></html>
  `);
  w.document.close();
}

async function exportarSolicitacaoDoc(id){
  const { data: so, error } = await sb.from('solicitacoes_orcamento').select('*').eq('id', id).single();
  if(error || !so){ toast('Erro ao carregar solicitação: '+(error?.message||''), true); return; }
  const { data: itens } = await sb.from('solicitacao_itens').select('*').eq('solicitacao_id', id).order('ordem');
  const corpo = `
    <h1>Solicitação de Orçamento <span class="id-pill">${so.numero}</span></h1>
    <div class="header-info">
      Data: ${fmtDate(so.data_solicitacao)} · Solicitante: ${so.solicitante||'—'} · Centro de custo: ${so.centro_custo||'—'}
      ${so.regime_urgente?' · <b>URGENTE</b>':''}
    </div>
    ${so.observacoes?`<p>${so.observacoes}</p>`:''}
    <table>
      <thead><tr><th>Código</th><th>Item</th><th>Unidade</th><th>Quantidade</th></tr></thead>
      <tbody>${(itens||[]).map(it=>`<tr><td>${it.codigo||'—'}</td><td>${it.item}</td><td>${it.unidade||'—'}</td><td>${it.quantidade}</td></tr>`).join('')}</tbody>
    </table>
    <p style="margin-top:24px;font-size:12px;color:#777">Documento gerado pelo sistema de Gestão de Compras — PO.04 / RQ.04.03.</p>
  `;
  abrirDocumentoImpressao(`Solicitação ${so.numero}`, corpo, {
    assunto: `Solicitação de Orçamento ${so.numero}`,
    corpo: `Prezado(a),\n\nSegue solicitação de orçamento ${so.numero} para os itens em anexo (PDF).\n\nAtenciosamente.`
  });
}

async function exportarComparativoDoc(id){
  const { data: so, error } = await sb.from('solicitacoes_orcamento').select('*').eq('id', id).single();
  if(error || !so){ toast('Erro ao carregar solicitação: '+(error?.message||''), true); return; }
  const { data: itens } = await sb.from('solicitacao_itens').select('*').eq('solicitacao_id', id).order('ordem');
  const { data: cotacoes } = await sb.from('cotacoes').select('*, fornecedores(nome)').eq('solicitacao_id', id).order('created_at');
  if(!cotacoes || cotacoes.length===0){ toast('Nenhuma cotação registrada ainda para esta solicitação — não há o que comparar.', true); return; }

  const { data: allCi } = await sb.from('cotacao_itens').select('*').in('cotacao_id', cotacoes.map(c=>c.id));
  let porCotacao = {};
  (allCi||[]).forEach(ci=>{ porCotacao[ci.cotacao_id] = porCotacao[ci.cotacao_id]||{}; porCotacao[ci.cotacao_id][ci.solicitacao_item_id]=ci; });
  let minByItem = {};
  (itens||[]).forEach(it=>{
    let min=null;
    cotacoes.forEach(c=>{ const ci = porCotacao[c.id]?.[it.id]; if(ci && ci.disponivel && ci.valor_unitario>0){ if(min===null||ci.valor_unitario<min) min=ci.valor_unitario; } });
    minByItem[it.id]=min;
  });
  const vencedora = cotacoes.find(c=>c.vencedora);

  const corpo = `
    <h1>Comparativo de Orçamentos <span class="id-pill">${so.numero}</span></h1>
    <div class="header-info">Data da solicitação: ${fmtDate(so.data_solicitacao)} · Centro de custo: ${so.centro_custo||'—'}</div>
    <table>
      <thead><tr><th>Item</th><th>Qtd</th>${cotacoes.map(c=>`<th>${c.fornecedores?.nome||'Fornecedor'}<br><small>${c.numero}</small></th>`).join('')}</tr></thead>
      <tbody>
        ${(itens||[]).map(it=>`<tr><td>${it.item}</td><td>${it.quantidade} ${it.unidade||''}</td>${cotacoes.map(c=>{
          const ci = porCotacao[c.id]?.[it.id];
          if(!ci) return '<td>—</td>';
          if(!ci.disponivel) return '<td>indisponível</td>';
          const best = minByItem[it.id]!==null && ci.valor_unitario===minByItem[it.id];
          return `<td class="${best?'best':''}">${money(ci.valor_unitario)}</td>`;
        }).join('')}</tr>`).join('')}
        <tr><td colspan="2" style="text-align:right;font-weight:700">Total</td>${cotacoes.map(c=>`<td style="font-weight:700">${money(c.valor_total)}</td>`).join('')}</tr>
      </tbody>
    </table>
    ${vencedora?`<p style="margin-top:16px"><b>Cotação vencedora:</b> ${vencedora.fornecedores?.nome||'—'} (${vencedora.numero})</p>`:'<p style="margin-top:16px;color:#a5680a"><b>Nenhuma cotação vencedora selecionada ainda.</b></p>'}
    <p style="margin-top:24px;font-size:12px;color:#777">Documento gerado pelo sistema de Gestão de Compras — PO.04 / RQ.04.04.</p>
  `;
  abrirDocumentoImpressao(`Comparativo ${so.numero}`, corpo, {
    assunto: `Comparativo de Orçamentos ${so.numero}`,
    corpo: `Segue em anexo o comparativo de orçamentos referente à solicitação ${so.numero}.`
  });
}

async function exportarOCDoc(ocId){
  const { data: oc, error } = await sb.from('ordens_compra')
    .select('*, fornecedores(nome,cnpj,email,telefone), solicitacoes_orcamento(numero)')
    .eq('id', ocId).single();
  if(error || !oc){ toast('Erro ao carregar ordem de compra: '+(error?.message||''), true); return; }
  const { data: cotItens } = await sb.from('cotacao_itens')
    .select('*, solicitacao_itens(item, unidade, quantidade, codigo)')
    .eq('cotacao_id', oc.cotacao_id);

  const corpo = `
    <h1>Ordem de Compra <span class="id-pill">${oc.numero}</span></h1>
    <div class="header-info">
      Emitida em: ${fmtDate(oc.data_emissao)} · Ref. Solicitação: ${oc.solicitacoes_orcamento?.numero||'—'} · Status: ${oc.status.replace('_',' ')}
    </div>
    <p><b>Fornecedor:</b> ${oc.fornecedores?.nome||'—'}${oc.fornecedores?.cnpj?(' — CNPJ '+oc.fornecedores.cnpj):''}<br>
    ${oc.fornecedores?.email||''} ${oc.fornecedores?.telefone||''}</p>
    <table>
      <thead><tr><th>Código</th><th>Item</th><th>Qtd</th><th>Valor unit.</th><th>Valor total</th></tr></thead>
      <tbody>${(cotItens||[]).filter(ci=>ci.disponivel).map(ci=>`<tr><td>${ci.solicitacao_itens?.codigo||'—'}</td><td>${ci.solicitacao_itens?.item||'—'}</td><td>${ci.solicitacao_itens?.quantidade||''} ${ci.solicitacao_itens?.unidade||''}</td><td>${money(ci.valor_unitario)}</td><td>${money(ci.valor_total)}</td></tr>`).join('')}</tbody>
    </table>
    <p style="text-align:right;font-weight:700;margin-top:8px">Valor total da OC: ${money(oc.valor_total)}</p>
    <p style="margin-top:16px">Autorizado por: ${oc.autorizado_por||'—'} (via ${oc.forma_autorizacao||'—'})</p>
    ${oc.observacoes?`<p>${oc.observacoes}</p>`:''}
    <p style="margin-top:24px;font-size:12px;color:#777">Documento gerado pelo sistema de Gestão de Compras — PO.04 / RQ.04.21.</p>
  `;
  abrirDocumentoImpressao(`Ordem de Compra ${oc.numero}`, corpo, {
    destinatario: oc.fornecedores?.email || '',
    assunto: `Ordem de Compra ${oc.numero}`,
    corpo: `Prezado(a) ${oc.fornecedores?.nome||''},\n\nSegue em anexo a Ordem de Compra ${oc.numero}.\n\nAtenciosamente.`
  });
}

/* ============================================================
   TAB: SOLICITAÇÕES — lista
   ============================================================ */

async function salvarSolicitacao(){
  const data_solicitacao = document.getElementById('ns_data').value;
  const solicitante = document.getElementById('ns_solicitante').value.trim();
  const centro_custo = document.getElementById('ns_cc').value.trim();
  const regime_urgente = document.getElementById('ns_urgente').checked;
  const observacoes = document.getElementById('ns_obs').value.trim();
  const rows = [...document.querySelectorAll('#ns_itens .item-row')].map(r=>({
    codigo: r.querySelector('.it-cod').value.trim(),
    item: r.querySelector('.it-desc').value.trim(),
    unidade: r.querySelector('.it-un').value.trim(),
    quantidade: Number(r.querySelector('.it-qtd').value)||1
  })).filter(r=>r.item);

  if(rows.length===0){ toast('Adicione ao menos um item.', true); return; }

  try{
    const numero = await gerarId('SO');
    const { data: so, error } = await sb.from('solicitacoes_orcamento').insert({
      tenant_id: cfg.tenantId, numero, data_solicitacao, solicitante, centro_custo,
      regime_urgente, observacoes, status:'aberta'
    }).select().single();
    if(error) throw error;

    const itensPayload = rows.map((r,i)=>({...r, solicitacao_id: so.id, ordem:i}));
    const { error: e2 } = await sb.from('solicitacao_itens').insert(itensPayload);
    if(e2) throw e2;

    closeModal();
    toast(`Solicitação ${numero} criada.`);
    openSolicitacao(so.id);
  }catch(err){
    toast('Erro ao salvar: '+err.message, true);
  }
}

async function renderSolicitacaoDetail(id){
  const main = document.getElementById('main');
  main.innerHTML = `<div class="card"><p class="muted">Carregando…</p></div>`;

  const [{data:so},{data:itens},{data:cotacoes},{data:fornecedores}] = await Promise.all([
    sb.from('solicitacoes_orcamento').select('*').eq('id',id).single(),
    sb.from('solicitacao_itens').select('*').eq('solicitacao_id',id).order('ordem'),
    sb.from('cotacoes').select('*, fornecedores(nome)').eq('solicitacao_id',id).order('created_at'),
    sb.from('fornecedores').select('*').eq('tenant_id',cfg.tenantId).eq('ativo',true)
  ]);

  let cotItensByCotacao = {};
  if(cotacoes && cotacoes.length){
    const { data: allCi } = await sb.from('cotacao_itens').select('*').in('cotacao_id', cotacoes.map(c=>c.id));
    (allCi||[]).forEach(ci=>{
      cotItensByCotacao[ci.cotacao_id] = cotItensByCotacao[ci.cotacao_id]||{};
      cotItensByCotacao[ci.cotacao_id][ci.solicitacao_item_id] = ci;
    });
  }

  // menor valor por item entre as cotações, para destacar no comparativo
  let minByItem = {};
  (itens||[]).forEach(it=>{
    let min = null;
    (cotacoes||[]).forEach(c=>{
      const ci = cotItensByCotacao[c.id]?.[it.id];
      if(ci && ci.disponivel && ci.valor_unitario>0){
        if(min===null || ci.valor_unitario < min) min = ci.valor_unitario;
      }
    });
    minByItem[it.id] = min;
  });

  const vencedora = (cotacoes||[]).find(c=>c.vencedora);
  const jaTemOC = so.status === 'concluida';

  main.innerHTML = `
    <div class="breadcrumb"><span onclick="state={tab:'solicitacoes',solicitacaoId:null};route()">← Solicitações</span> / ${so.numero}</div>
    <div class="card">
      <div class="row">
        <div>
          <span class="id-pill">${so.numero}</span>
          <span class="status ${so.status}" style="margin-left:8px">${so.status.replace('_',' ')}</span>
          ${so.regime_urgente?'<span class="status cancelada" style="margin-left:6px">urgente</span>':''}
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-outline btn-sm" onclick="exportarSolicitacaoDoc('${so.id}')">📄 Exportar Solicitação</button>
          <button class="btn btn-outline btn-sm" onclick="exportarComparativoDoc('${so.id}')">📊 Exportar Comparativo</button>
        </div>
      </div>
      <div class="muted" style="margin-top:6px">${fmtDate(so.data_solicitacao)} · ${so.solicitante||'—'} · ${so.centro_custo||'—'}</div>
      </div>
      ${so.observacoes?`<p class="muted" style="margin-top:10px">${so.observacoes}</p>`:''}
    </div>

    <div class="card">
      <h3 style="margin-top:0">Itens solicitados</h3>
      <table>
        <thead><tr><th>Cód.</th><th>Item</th><th>Un.</th><th>Qtd</th>${(cotacoes||[]).map(c=>`<th>${c.fornecedores?.nome||'Fornecedor'}<br><span class="muted" style="font-weight:400">${c.numero}</span></th>`).join('')}</tr></thead>
        <tbody>
          ${(itens||[]).map(it=>`
            <tr>
              <td>${it.codigo||'—'}</td>
              <td>${it.item}</td>
              <td>${it.unidade||'—'}</td>
              <td>${it.quantidade}</td>
              ${(cotacoes||[]).map(c=>{
                const ci = cotItensByCotacao[c.id]?.[it.id];
                if(!ci) return `<td class="muted">—</td>`;
                if(!ci.disponivel) return `<td class="muted">indisponível</td>`;
                const isBest = minByItem[it.id]!==null && ci.valor_unitario === minByItem[it.id];
                return `<td class="${isBest?'best':''}">${money(ci.valor_unitario)}</td>`;
              }).join('')}
            </tr>
          `).join('')}
          <tr>
            <td colspan="4" style="text-align:right;font-weight:700">Total</td>
            ${(cotacoes||[]).map(c=>`<td style="font-weight:700">${money(c.valor_total)}</td>`).join('')}
          </tr>
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="row">
        <h3 style="margin:0">Cotações recebidas</h3>
        ${!jaTemOC ? `<button class="btn btn-teal" onclick="openNovaCotacao('${so.id}')">+ Registrar cotação recebida</button>` : ''}
      </div>
      ${(!cotacoes||cotacoes.length===0) ? `<p class="muted" style="margin-top:10px">Nenhuma cotação registrada ainda. Ao ler um e-mail de orçamento, registre aqui com os valores por item.</p>` : `
      <table style="margin-top:10px">
        <thead><tr><th>ID</th><th>Fornecedor</th><th>Recebida em</th><th>Prazo entrega</th><th>Valor total</th><th></th><th></th></tr></thead>
        <tbody>
          ${cotacoes.map(c=>`
            <tr>
              <td><span class="id-pill">${c.numero}</span></td>
              <td>${c.fornecedores?.nome||'—'}</td>
              <td>${fmtDate(c.data_recebimento)}</td>
              <td>${c.prazo_entrega||'—'}</td>
              <td>${money(c.valor_total)}</td>
              <td>${c.anexo_path?`<a class="link" href="#" onclick="abrirAnexo('${c.anexo_path}');return false;">📎 anexo</a>`:''}</td>
              <td style="text-align:right">
                ${c.vencedora ? `<span class="status concluida">vencedora</span>` : (jaTemOC ? '' : `<button class="btn btn-outline btn-sm" onclick="marcarVencedora('${so.id}','${c.id}')">Selecionar</button>`)}
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>`}

    ${vencedora && !jaTemOC ? `

      <div class="row">

      </div>
    </div>` : ''}

    ${jaTemOC ? `<div class="card"><p class="muted">Ordem de compra já emitida para esta solicitação. Veja em <span class="link" onclick="document.querySelector('[data-tab=ordens]').click()">Ordens de Compra</span>.</p></div>` : ''}
  `;

  window.__ctx = { so, itens, cotacoes, fornecedores, cotItensByCotacao };
}

async function salvarCotacao(solicitacaoId){
  const fornecedor_id = document.getElementById('nc_fornecedor').value;
  if(!fornecedor_id){ toast('Selecione o fornecedor.', true); return; }
  const data_recebimento = document.getElementById('nc_data').value;
  const origem_email = document.getElementById('nc_origem').value.trim();
  const frete = Number(document.getElementById('nc_frete').value)||0;
  const forma_pagamento = document.getElementById('nc_pagto').value.trim();
  const prazo_entrega = document.getElementById('nc_prazo').value.trim();
  const validade = document.getElementById('nc_validade').value || null;
  const fileInput = document.getElementById('nc_anexo');

  const itemRows = [...document.querySelectorAll('.ci-valor')].map(inp=>({
    solicitacao_item_id: inp.dataset.item,
    valor_unitario: Number(inp.value)||0,
    disponivel: document.querySelector(`.ci-disp[data-item="${inp.dataset.item}"]`).checked
  }));

  const { itens } = window.__ctx;
  let valor_total = frete;
  itemRows.forEach(r=>{
    const it = itens.find(i=>i.id===r.solicitacao_item_id);
    const tot = r.disponivel ? r.valor_unitario * (it?.quantidade||1) : 0;
    r.valor_total = tot;
    valor_total += tot;
  });

  try{
    const numero = await gerarId('CT');

    let anexo_path = null;
    if(fileInput.files && fileInput.files[0]){
      const file = fileInput.files[0];
      const path = `${cfg.tenantId}/${numero}-${file.name}`;
      const { error: upErr } = await sb.storage.from('cotacoes-anexos').upload(path, file, { upsert:true });
      if(upErr) toast('Aviso: falha ao subir anexo ('+upErr.message+'), cotação será salva sem anexo.', true);
      else anexo_path = path;
    }

    const { data: cot, error } = await sb.from('cotacoes').insert({
      tenant_id: cfg.tenantId, numero, solicitacao_id: solicitacaoId, fornecedor_id,
      data_recebimento, origem_email, anexo_path, frete, forma_pagamento, prazo_entrega,
      validade, valor_total
    }).select().single();
    if(error) throw error;

    const ciPayload = itemRows.map(r=>({...r, cotacao_id: cot.id}));
    const { error: e2 } = await sb.from('cotacao_itens').insert(ciPayload);
    if(e2) throw e2;

    await sb.from('solicitacoes_orcamento').update({ status:'em_cotacao' }).eq('id', solicitacaoId);

    closeModal();
    toast(`Cotação ${numero} registrada.`);
    renderSolicitacaoDetail(solicitacaoId);
  }catch(err){
    toast('Erro ao salvar cotação: '+err.message, true);
  }
}

async function abrirAnexo(path){
  const { data, error } = await sb.storage.from('cotacoes-anexos').createSignedUrl(path, 300);
  if(error){ toast('Erro ao abrir anexo: '+error.message, true); return; }
  window.open(data.signedUrl, '_blank');
}

async function marcarVencedora(solicitacaoId, cotacaoId){

    await sb.from('cotacoes').update({ vencedora:false }).eq('solicitacao_id', solicitacaoId);

    toast('Cotação vencedora selecionada.');

}

async function salvarOC(solicitacaoId, cotacaoId){
  const autorizado_por = document.getElementById('oc_autorizador').value.trim();
  const forma_autorizacao = document.getElementById('oc_forma').value;
  const observacoes = document.getElementById('oc_obs').value.trim();

  try{
    const { data: cot } = await sb.from('cotacoes').select('*').eq('id',cotacaoId).single();
    const numero = await gerarId('OC');
    const { error } = await sb.from('ordens_compra').insert({
      tenant_id: cfg.tenantId, numero, solicitacao_id: solicitacaoId, cotacao_id: cotacaoId,
      fornecedor_id: cot.fornecedor_id, valor_total: cot.valor_total,
      autorizado_por, forma_autorizacao, observacoes, status:'emitida'
    });
    if(error) throw error;
    await sb.from('solicitacoes_orcamento').update({ status:'concluida' }).eq('id', solicitacaoId);
    closeModal();
    toast(`Ordem de Compra ${numero} gerada.`);
    renderSolicitacaoDetail(solicitacaoId);
  }catch(err){ toast('Erro ao gerar OC: '+err.message, true); }
}

  const main = document.getElementById('main');
  main.innerHTML = `<div class="card"><p class="muted">Carregando…</p></div>`;
  const { data: fs, error } = await sb.from('fornecedores').select('*').eq('tenant_id', cfg.tenantId).order('nome');
  if(error){ main.innerHTML = `<div class="card empty">Erro: ${error.message}</div>`; return; }

  main.innerHTML = `
    <div class="card">
      <div class="row">
        <h2 style="margin:0">Fornecedores</h2>
        <button class="btn btn-primary" onclick="openNovoFornecedor()">+ Novo Fornecedor</button>
      </div>
    </div>
    <div class="card" style="padding:0">
      ${fs.length===0 ? `<div class="empty"><div class="display">Nenhum fornecedor cadastrado</div></div>` : `
      <table>
        <thead><tr><th>Nome</th><th>CNPJ</th><th>Contato</th><th>Qualificado RQ.07.14</th><th>Ativo</th></tr></thead>
        <tbody>
          ${fs.map(f=>`
            <tr>
              <td>${f.nome}</td>
              <td class="muted">${f.cnpj||'—'}</td>
              <td class="muted">${f.email||f.telefone||'—'}</td>
              <td>${f.qualificado_rq0714?'<span class="status concluida">sim</span>':'<span class="status cancelada">não</span>'}</td>
              <td>${f.ativo?'sim':'não'}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`}
    </div>
  `;
}
function openNovoFornecedor(){
  renderModal(`
    <div class="row"><h2>Novo Fornecedor</h2><button class="close-x" onclick="closeModal()">✕</button></div>
    <div class="grid2">
      <div class="field"><label>Nome</label><input id="nf_nome"></div>
      <div class="field"><label>CNPJ</label><input id="nf_cnpj"></div>
      <div class="field"><label>E-mail</label><input id="nf_email"></div>
      <div class="field"><label>Telefone</label><input id="nf_tel"></div>
    </div>
    <div class="field"><label><input type="checkbox" id="nf_qual" style="width:auto;display:inline-block;margin-right:6px">Qualificado no RQ.07.14 (Check List Amb./Adm.)</label></div>
    <div class="row" style="margin-top:16px;justify-content:flex-end">
      <button class="btn btn-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvarFornecedor()">Salvar</button>
    </div>
  `);
}
async function salvarFornecedor(){
  const nome = document.getElementById('nf_nome').value.trim();
  if(!nome){ toast('Informe o nome.', true); return; }
  const payload = {
    tenant_id: cfg.tenantId, nome,
    cnpj: document.getElementById('nf_cnpj').value.trim(),
    email: document.getElementById('nf_email').value.trim(),
    telefone: document.getElementById('nf_tel').value.trim(),
    qualificado_rq0714: document.getElementById('nf_qual').checked
  };
  const { error } = await sb.from('fornecedores').insert(payload);
  if(error){ toast('Erro: '+error.message, true); return; }
  closeModal(); toast('Fornecedor cadastrado.'); renderFornecedores();
}

/* ============================================================
   AUTENTICAÇÃO — mesmo padrão do auth.js usado nos outros painéis:
   login via Supabase Auth, depois checa painel_permissoes para
   este painel ('compras') e descobre o tenant_id automaticamente.
   ============================================================ */
function showLogin(msg){
  document.getElementById('loginScreen').style.display = 'block';
  document.getElementById('appHeader').style.display = 'none';
  document.getElementById('main').style.display = 'none';
  document.getElementById('loginMsg').textContent = msg || '';
}
function showApp(email){
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appHeader').style.display = 'flex';
  document.getElementById('main').style.display = 'block';
  document.getElementById('userEmail').textContent = email || '';
}

async function fazerLogin(){
  const email = document.getElementById('login_email').value.trim();
  const senha = document.getElementById('login_senha').value;
  if(!email || !senha){ document.getElementById('loginMsg').textContent = 'Preencha e-mail e senha.'; return; }
  document.getElementById('loginMsg').textContent = 'Entrando...';
  const { error } = await sb.auth.signInWithPassword({ email, password: senha });
  if(error){ document.getElementById('loginMsg').textContent = 'Erro: '+error.message; return; }
  await checkAuth();
}
async function fazerLogout(){
  await sb.auth.signOut();
  cfg.tenantId = null;
  showLogin();
}

async function checkAuth(){
  if(!sb){ return; } // sem config de URL/anonKey ainda
  const { data: { session } } = await sb.auth.getSession();
  console.log('[DIAG] sessão:', session);
  if(!session){ showLogin(); return; }
  console.log('[DIAG] user_id logado:', session.user.id, '| email:', session.user.email);

  const { data: permissao, error } = await sb
    .from('painel_permissoes')
    .select('tenant_id, ativo')
    .eq('user_id', session.user.id)
    .eq('painel', 'compras')
    .maybeSingle();

  console.log('[DIAG] resultado da query filtrada:', { permissao, error });

  const semFiltro = await sb.from('painel_permissoes').select('*');
  console.log('[DIAG] TODAS as linhas visíveis para este usuário (sem filtro):', semFiltro);

  if(error) console.error('Erro ao consultar painel_permissoes:', error);

  if(error || !permissao || !permissao.ativo){
    const detalhe = error ? (' [debug: '+error.message+']') : ' [debug: nenhuma linha encontrada/ativa]';
    showLogin('Login ok, mas sem permissão de acesso a este painel. Peça para liberar o acesso (painel_permissoes / painel=\'compras\').' + detalhe);
    // Sessão mantida de propósito (sem signOut) para permitir diagnóstico via
    // console do navegador enquanto o problema de permissão é investigado.
    return;
  }

  cfg.tenantId = permissao.tenant_id;
  showApp(session.user.email);
  route();
}

/* init */
if(sb){ checkAuth(); } else { showLogin('Configuração do Supabase ausente.'); }

</script>
